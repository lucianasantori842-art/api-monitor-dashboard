<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Monitor — Live Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>

  <header>
    <div class="logo">
      <span class="logo-dot"></span>
      <span>API<strong>MONITOR</strong></span>
    </div>
    <div class="header-right">
      <span class="clock" id="clock">--:--:--</span>
      <div class="status-badge" id="overall-status">CONNECTING...</div>
    </div>
  </header>

  <main>
    <section class="summary-bar">
      <div class="summary-card">
        <span class="summary-label">ONLINE</span>
        <span class="summary-value" id="count-up">—</span>
      </div>
      <div class="summary-card warning">
        <span class="summary-label">SLOW</span>
        <span class="summary-value" id="count-slow">—</span>
      </div>
      <div class="summary-card danger">
        <span class="summary-label">DOWN</span>
        <span class="summary-value" id="count-down">—</span>
      </div>
      <div class="summary-card neutral">
        <span class="summary-label">AVG LATENCY</span>
        <span class="summary-value" id="avg-latency">— ms</span>
      </div>
    </section>

    <section class="apis-grid" id="apis-grid">
      <div class="loading-state">Connecting to APIs...</div>
    </section>

    <section class="log-section">
      <div class="log-header">
        <h2>EVENT LOG</h2>
        <button onclick="clearLog()">CLEAR</button>
      </div>
      <div class="log-list" id="log-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
